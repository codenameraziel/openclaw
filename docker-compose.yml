version: "3.8"

services:
  openclaw:
    image: coollabsio/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "8888:8080"     # Interface principal
      - "18789:18789"   # Gateway
      - "18791:18791"   # Browser Control / WebSocket
    environment:
      MODELS_CONFIG: /etc/openclaw/modelsConfig.json
      OPENCLAW_GATEWAY_TOKEN: a3f9c8d7e2b14f0c9d8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6
      gateway.controlUi.allowedOrigins: "http://192.168.100.105:3100,https://openclaw.tailc9398a.ts.net"
      gateway.trustedProxies: "192.168.100.0/24"
      LLM_TIMEOUT: 120
      REQUEST_TIMEOUT: 120
    volumes:
      - ./modelsConfig.json:/etc/openclaw/modelsConfig.json:ro
      - ./logs:/tmp/openclaw
