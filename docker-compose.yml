version: "3.7"

services:
  openclaw-gateway:
    image: ghcr.io/harmalh/openclaw-umbrel:candidate-v2026.1.30
    container_name: openclaw-gateway
    user: "1000:1000"

    environment:
      OPENCLAW_GATEWAY_TOKEN: ${GATEWAY_TOKEN:-seu-token-secreto}
      OPENCLAW_STATE_DIR: /data/.clawdbot
      OPENCLAW_WORKSPACE_DIR: /data/clawd
      OPENCLAW_LOG_DIR: /data/logs
      NODE_ENV: production
      HOME: /home/node

    volumes:
      - ./data:/data

    expose:
      - "18789"

    restart: unless-stopped
    init: true
    stop_grace_period: 30s

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    depends_on:
      - openclaw-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/logs:/var/log/nginx
      - ./nginx/certs:/etc/nginx/certs
    restart: unless-stopped
