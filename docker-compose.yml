version: "3.9"

services:
  browser:
    image: nginx:alpine
    container_name: browser-stub
    command: >
      sh -c "echo 'stub browser service' > /usr/share/nginx/html/index.html &&
      nginx -g 'daemon off;'"
    ports:
      - "8888:80"

  openclaw:
    image: coollabsio/openclaw:latest
    container_name: openclaw-web
    restart: unless-stopped
    environment:
      OPENCLAW_PRIMARY_MODEL: "mistral:7b-instruct-v0.3-q4_K_M"
      OPENCLAW_GATEWAY_TOKEN: "a3f9c8d7e2b14f0c9d8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6"
      OLLAMA_BASE_URL: "http://ollama-proxy:8000"
      GATEWAY_CONTROLUI_ALLOWEDORIGINS: "https://openclaw.teccryptor3dprint.dpdns.org,http://192.18.100.105:8070"
      GATEWAY_TRUSTEDPROXIES: "0.0.0.0/24"
      LLM_TIMEOUT: 120
      REQUEST_TIMEOUT: 120
    volumes:
      - openclaw-data:/data
      - ./openclaw.json:/app/config/openclaw.json
      - ./logs:/tmp/openclaw
    ports:
      - "8070:8080"     # UI principal
      - "18792:18791"   # API interna
      - "18800:18789"   # Ajuste extra

volumes:
  openclaw-data:

