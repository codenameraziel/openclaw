services:
  openclaw-web:
    build: .
    container_name: openclaw-web
    restart: always
    # Comando corrigido para evitar o erro de setup e argumentos
    command: ["gateway", "--mode", "local", "--allow-unconfigured"]
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - OPENCLAW_GATEWAY_TOKEN=1b18214257440a5acd3178e5d648e51b0b9bc3fb9afe0c95
    volumes:
      - ./openclaw.json:/data/.openclaw/openclaw.json
      - ./openclaw-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3100:8080"
      - "18792:18791"
    depends_on:
      - browser

  browser:
    image: nginx:alpine
    container_name: browser
    restart: always

volumes:
  openclaw_data:
