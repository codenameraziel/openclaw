version: "3.9"
services:
  vllm:
    build: ./vllm
    container_name: vllm-server
    environment:
      - VLLM_LOGGING_LEVEL=DEBUG   # opcional, para ver logs detalhados
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model meta-llama/Llama-2-7b-chat-hf
      --port 8000
      --host 0.0.0.0
      --device cpu
    ports:
      - "9000:8000"

  openclaw:
    build: ./openclaw
    container_name: openclaw-web
    environment:
      - MODELS_CONFIG=/etc/openclaw/modelsConfig.json
    volumes:
      - ./modelsConfig.json:/etc/openclaw/modelsConfig.json
    ports:
      - "3000:8080"
