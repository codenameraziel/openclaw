version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    networks:
      - openclaw-net
    restart: unless-stopped

  ollama-proxy:
    build: ./proxy
    container_name: ollama-proxy
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    networks:
      - openclaw-net
    restart: unless-stopped

  openclaw:
    image: coollabsio/openclaw:latest
    container_name: openclaw
    ports:
      - "8070:8080"     # UI
      - "18789:18789"   # Gateway
    environment:
      OPENCLAW_PRIMARY_MODEL: "proxy/llama3:8b"
      OLLAMA_BASE_URL: "http://ollama-proxy:8000"
      OPENCLAW_GATEWAY_TOKEN: "b152d21cd7fb35576276938afe56acd7f8bc74cc8b9dddd2"
      AUTH_USERNAME: "${AUTH_USERNAME:-admin}"
      AUTH_PASSWORD: "${AUTH_PASSWORD}"
      BROWSER_CDP_URL: "http://browser:9222"
      BROWSER_DEFAULT_PROFILE: "openclaw"
      BROWSER_EVALUATE_ENABLED: "true"
    volumes:
      - openclaw-data:/data
      - ./openclaw.json:/app/config/openclaw.json
      - ./openclaw:/data/.openclaw
    depends_on:
      - browser
      - ollama-proxy
    networks:
      - openclaw-net
    restart: unless-stopped

  browser:
    image: coollabsio/openclaw-browser:latest
    container_name: openclaw-browser-1
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      CHROME_CLI: "--remote-debugging-port=9222"
      GATEWAY_URL: "ws://openclaw:18789"
      SELKIES_MASTER_TOKEN: "b152d21cd7fb35576276938afe56acd7f8bc74cc8b9dddd2"
    volumes:
      - browser-data:/config
    shm_size: 2g
    networks:
      - openclaw-net
    restart: unless-stopped

volumes:
  openclaw-data:
  browser-data:

networks:
  openclaw-net:
    driver: bridge
