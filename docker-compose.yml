version: "3.9"

services:
  openclaw:
    image: coollabsio/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"   # Porta do gateway definida no openclaw.json
    volumes:
      - ./openclaw.json:/data/openclaw.json:ro
      - ./device.json:/data/device.json:ro
      - ./jobs.json:/data/jobs.json:rw
      - ./agents:/data/agents:rw
      - ./canvas:/data/canvas:rw
    env_file:
      - .env
    environment:
      - LLM_TIMEOUT=120
      - REQUEST_TIMEOUT=120
    command: ["onboard"]
