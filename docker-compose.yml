version: "3.9"

services:
  openclaw:
    image: coollabsio/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"   # Gateway
      - "8070:8080"     # Painel web via nginx (externo 8070 ? interno 8080)
    volumes:
      - ./openclaw.json:/data/openclaw.json:ro
      - ./device.json:/data/device.json:ro
      - ./jobs.json:/data/jobs.json:rw
      - ./agents:/data/agents:rw
      - ./canvas:/data/canvas:rw
    env_file:
      - .env
    environment:
      - LLM_TIMEOUT=120
      - REQUEST_TIMEOUT=120
    command: ["onboard"]

  browser:
    image: nginx:alpine
    container_name: browser-stub
    command: >
      sh -c "echo 'stub browser service' > /usr/share/nginx/html/index.html &&
             nginx -g 'daemon off;'"
    expose:
      - "80"

