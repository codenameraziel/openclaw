version: "3.9"
services:
  browser:
    image: nginx:alpine
    container_name: browser-stub
    command: ["sh", "-c", "echo 'stub browser service' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
    ports:
      - "8888:80"

  openclaw:
    image: coollabsio/openclaw:latest
    container_name: openclaw-web
    environment:
      MODELS_CONFIG: /etc/openclaw/modelsConfig.json
      OPENCLAW_GATEWAY_TOKEN: a3f9c8d7e2b14f0c9d8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6
      OLLAMA_BASE_URL: http://ollama-proxy:8000   # usa o proxy ja existente
      gateway.controlUi.allowedOrigins: "http://umbrel.tailc9398a.ts.net:3100"
      gateway.trustedProxies: "*"
      LLM_TIMEOUT: 120
      REQUEST_TIMEOUT: 120
    volumes:
      - ./modelsConfig.json:/etc/openclaw/modelsConfig.json
    ports:
      - "3100:8080"   # interface principal
      - "18791:18791" # browser control
    depends_on:
      - browser
