version: "3.9"
services:
  vllm:
    build: ./vllm
    container_name: vllm-server
    ports:
      - "9000:8000"   # expoe vLLM externamente na porta 9000

  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw-web
    environment:
      - MODELS_CONFIG=/etc/openclaw/modelsConfig.json
    volumes:
      - ./modelsConfig.json:/etc/openclaw/modelsConfig.json
    ports:
      - "3000:8080"   # expoe OpenClaw externamente na porta 3000
